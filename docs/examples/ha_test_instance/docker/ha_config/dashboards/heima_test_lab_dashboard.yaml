# Heima Test Lab Dashboard (Lovelace YAML)
# Usage:
# 1) Dashboard -> Edit -> Raw configuration editor (or Add card -> Manual for each card)
# 2) Paste this YAML as a full view/cards block as preferred

title: Heima Test Lab
views:
  - title: Heima Test Lab
    path: heima-test-lab
    icon: mdi:test-tube
    cards:
      - type: markdown
        content: |
          ## Heima Test Lab
          Dedicated fake entities for end-to-end validation of occupancy + heating behavior.

      - type: entities
        title: Core House Signals
        show_header_toggle: false
        entities:
          - entity: input_boolean.test_heima_vacation_mode
          - entity: input_boolean.test_heima_guest_mode
          - entity: input_boolean.test_heima_sleep_mode
          - entity: input_boolean.test_heima_relax_mode
          - entity: input_boolean.test_heima_work_mode
          - entity: binary_sensor.test_heima_sleep_window
          - entity: binary_sensor.test_heima_relax_mode
          - entity: binary_sensor.test_heima_work_window

      - type: entities
        title: Presence Sources
        show_header_toggle: false
        entities:
          - entity: input_boolean.test_heima_room_studio_motion_raw
          - entity: binary_sensor.test_heima_room_studio_motion
          - entity: input_boolean.test_heima_room_living_motion_raw
          - entity: binary_sensor.test_heima_room_living_motion
          - entity: input_boolean.test_heima_anonymous_presence_raw
          - entity: binary_sensor.test_heima_anonymous_presence
          - entity: input_number.test_heima_people_score
          - entity: sensor.test_heima_people_score
          - entity: binary_sensor.test_heima_mqtt_motion
          - entity: sensor.test_heima_mqtt_presence_score

      - type: entities
        title: Camera Evidence Sources
        show_header_toggle: false
        entities:
          - entity: input_boolean.test_heima_camera_entry_person_raw
          - entity: binary_sensor.test_heima_camera_entry_person
          - entity: input_boolean.test_heima_camera_entry_motion_raw
          - entity: binary_sensor.test_heima_camera_entry_motion
          - entity: input_boolean.test_heima_front_door_contact_raw
          - entity: binary_sensor.test_heima_front_door_contact
          - entity: input_boolean.test_heima_camera_garage_person_raw
          - entity: binary_sensor.test_heima_camera_garage_person
          - entity: input_boolean.test_heima_camera_garage_vehicle_raw
          - entity: binary_sensor.test_heima_camera_garage_vehicle
          - entity: input_boolean.test_heima_garage_door_contact_raw
          - entity: binary_sensor.test_heima_garage_door_contact

      - type: thermostat
        entity: climate.test_heima_thermostat
        name: Fake Thermostat

      - type: entities
        title: Heating Vacation Inputs
        show_header_toggle: false
        entities:
          - entity: sensor.test_heima_room_temp
          - entity: input_number.test_heima_room_temp
          - entity: sensor.test_heima_outdoor_temp
          - entity: input_number.test_heima_outdoor_temp
          - entity: input_number.test_heima_vacation_min_temp
          - entity: input_number.test_heima_vacation_comfort_temp
          - entity: input_datetime.test_heima_vacation_start
          - entity: input_datetime.test_heima_vacation_end
          - entity: sensor.test_heima_vacation_hours_from_start
          - entity: sensor.test_heima_vacation_hours_to_end
          - entity: sensor.test_heima_vacation_total_hours
          - entity: binary_sensor.test_heima_vacation_is_long
          - entity: switch.test_heima_heater_relay

      - type: history-graph
        title: Thermal Dynamics (12h)
        hours_to_show: 12
        refresh_interval: 30
        entities:
          - entity: sensor.test_heima_room_temp
          - entity: sensor.test_heima_outdoor_temp
          - entity: switch.test_heima_heater_relay
          - entity: input_boolean.test_heima_vacation_mode

      - type: grid
        title: Test Actions
        columns: 2
        square: false
        cards:
          - type: button
            name: Reset Lab
            icon: mdi:restore
            tap_action:
              action: call-service
              service: script.test_heima_reset

          - type: button
            name: Set Vacation (36h)
            icon: mdi:beach
            tap_action:
              action: call-service
              service: script.test_heima_set_vacation_curve_short

          - type: button
            name: Set Cold House
            icon: mdi:snowflake-thermometer
            tap_action:
              action: call-service
              service: script.test_heima_set_cold_house

          - type: button
            name: MQTT Demo
            icon: mdi:wifi
            tap_action:
              action: call-service
              service: script.test_heima_mqtt_publish_demo

          - type: button
            name: Clear Camera Evidence
            icon: mdi:cctv-off
            tap_action:
              action: call-service
              service: script.test_heima_camera_clear

          - type: button
            name: Entry Arrival
            icon: mdi:door-open
            tap_action:
              action: call-service
              service: script.test_heima_camera_entry_arrival

          - type: button
            name: Garage Arrival
            icon: mdi:garage-open
            tap_action:
              action: call-service
              service: script.test_heima_camera_garage_arrival

          - type: button
            name: Garage Person Alert
            icon: mdi:cctv
            tap_action:
              action: call-service
              service: script.test_heima_camera_garage_person_alert

  - title: Heima Runtime
    path: heima-runtime
    icon: mdi:home-assistant
    cards:
      - type: markdown
        content: |
          ## Heima Runtime Debug
          Cross-check Heima canonical entities against the fake test-lab inputs.

      - type: entities
        title: House State
        show_header_toggle: false
        entities:
          - entity: sensor.heima_house_state
          - entity: sensor.heima_house_state_reason
          - entity: binary_sensor.heima_anyone_home
          - entity: sensor.heima_people_count
          - entity: sensor.heima_people_home_list
          - entity: sensor.heima_last_event
          - entity: sensor.heima_event_stats

      - type: entities
        title: Occupancy + Presence
        show_header_toggle: false
        entities:
          - entity: binary_sensor.heima_occupancy_studio
          - entity: binary_sensor.heima_occupancy_soggiorno
          - entity: binary_sensor.heima_occupancy_bagno
          - entity: binary_sensor.heima_anonymous_presence
          - entity: sensor.heima_anonymous_confidence
          - entity: sensor.heima_anonymous_source
          - entity: sensor.heima_occupancy_studio_source
          - entity: sensor.heima_occupancy_soggiorno_source
          - entity: sensor.heima_occupancy_bagno_source

      - type: entities
        title: Heating
        show_header_toggle: false
        entities:
          - entity: climate.test_heima_thermostat
          - entity: sensor.heima_heating_state
          - entity: sensor.heima_heating_branch
          - entity: sensor.heima_heating_reason
          - entity: sensor.heima_heating_phase
          - entity: sensor.heima_heating_target_temp
          - entity: sensor.heima_heating_current_setpoint
          - entity: sensor.heima_heating_last_applied_target
          - entity: binary_sensor.heima_heating_manual_hold
          - entity: binary_sensor.heima_heating_applying_guard

      - type: entities
        title: Security + Camera Evidence
        show_header_toggle: false
        entities:
          - entity: alarm_control_panel.test_heima_alarm
          - entity: sensor.heima_security_state
          - entity: sensor.heima_security_reason
          - entity: select.heima_security_intent
          - entity: binary_sensor.test_heima_camera_entry_person
          - entity: binary_sensor.test_heima_camera_entry_motion
          - entity: binary_sensor.test_heima_camera_garage_person
          - entity: binary_sensor.test_heima_camera_garage_vehicle

      - type: entities
        title: Learning
        show_header_toggle: false
        entities:
          - entity: sensor.heima_event_store
            name: Pattern events recorded
          - type: attribute
            entity: sensor.heima_event_store
            attribute: presence
            name: Presence events
          - type: attribute
            entity: sensor.heima_event_store
            attribute: heating
            name: Heating events
          - entity: sensor.heima_reaction_proposals
            name: Pending proposals

      - type: history-graph
        title: Heima Runtime History (12h)
        hours_to_show: 12
        refresh_interval: 30
        entities:
          - entity: sensor.heima_house_state
          - entity: sensor.heima_heating_branch
          - entity: sensor.heima_heating_target_temp
          - entity: binary_sensor.heima_anyone_home

  - title: Heima Monitoring
    path: heima-monitoring
    icon: mdi:chart-line
    cards:
      - type: markdown
        content: |
          ## Heima Monitoring
          Operational monitoring view for the fake house.

          Use this page to check if Heima is healthy, learning, reacting, and reading camera/security context correctly over time.

      - type: entities
        title: Daily Operations
        show_header_toggle: false
        entities:
          - entity: sensor.heima_house_state
          - entity: sensor.heima_house_state_reason
          - entity: sensor.heima_house_state_path
          - entity: binary_sensor.heima_anyone_home
          - entity: sensor.heima_people_count
          - entity: sensor.heima_security_state
          - entity: sensor.heima_security_reason
          - entity: sensor.heima_last_event

      - type: entities
        title: Learning And Runtime Value
        show_header_toggle: false
        entities:
          - entity: sensor.heima_reaction_proposals
          - entity: sensor.heima_reactions_active
          - entity: sensor.heima_event_stats
          - entity: sensor.heima_event_store
          - entity: sensor.heima_house_state_pending_candidate
          - entity: sensor.heima_house_state_pending_remaining_s

      - type: entities
        title: Camera Evidence Readout
        show_header_toggle: false
        entities:
          - entity: binary_sensor.test_heima_camera_entry_person
          - entity: binary_sensor.test_heima_camera_entry_motion
          - entity: binary_sensor.test_heima_camera_garage_person
          - entity: binary_sensor.test_heima_camera_garage_vehicle
          - entity: binary_sensor.heima_anonymous_presence
          - entity: sensor.heima_anonymous_source

      - type: history-graph
        title: Monitoring Trend (12h)
        hours_to_show: 12
        refresh_interval: 30
        entities:
          - entity: sensor.heima_house_state
          - entity: sensor.heima_security_state
          - entity: sensor.heima_reaction_proposals
          - entity: binary_sensor.heima_anyone_home

      - type: markdown
        content: |
          Deeper inspection:
          - `python3 scripts/diagnostics.py --ha-url "$HA_URL" --ha-token "$HA_TOKEN" --section engine`
          - `python3 scripts/diagnostics.py --ha-url "$HA_URL" --ha-token "$HA_TOKEN" --section security_camera_evidence`
          - `python3 scripts/learning_audit.py --ha-url "$HA_URL" --ha-token "$HA_TOKEN"`
