light:
  - platform: template
    lights:
      test_heima_living_main:
        friendly_name: "Test Heima Living Main"
        unique_id: test_heima_living_main
        value_template: "{{ is_state('input_boolean.test_heima_light_living_main_raw', 'on') }}"
        level_template: "{{ states('input_number.test_heima_light_living_main_brightness') | int(180) }}"
        temperature_template: "{{ states('input_number.test_heima_light_living_main_color_temp') | int(3000) }}"
        turn_on:
          action: input_boolean.turn_on
          target:
            entity_id: input_boolean.test_heima_light_living_main_raw
        turn_off:
          action: input_boolean.turn_off
          target:
            entity_id: input_boolean.test_heima_light_living_main_raw
        set_level:
          action: input_number.set_value
          target:
            entity_id: input_number.test_heima_light_living_main_brightness
          data:
            value: "{{ brightness }}"
        set_temperature:
          action: input_number.set_value
          target:
            entity_id: input_number.test_heima_light_living_main_color_temp
          data:
            value: "{{ kelvin if kelvin is defined else color_temp_kelvin if color_temp_kelvin is defined else color_temp }}"
      test_heima_living_spot:
        friendly_name: "Test Heima Living Spot"
