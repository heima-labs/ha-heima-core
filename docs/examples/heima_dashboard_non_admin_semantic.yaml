# Heima Non-Admin Semantic Dashboard (tablet-first example)
#
# Purpose:
# - consume only semantic heima_*_view sensors for the main user-facing story
# - avoid raw entity inspection in the presentation layer
# - provide a bounded demo-ready surface for non-admin users
#
# Notes:
# - quick actions assume the following scripts exist in the installation:
#   script.heima_relax
#   script.heima_buongiorno
#   script.heima_buonanotte
#   script.heima_ospiti
# - duplicate/adjust room cards for your configured rooms

title: Heima Home
path: heima-home
icon: mdi:home
type: sections
max_columns: 2
theme: visionos
sections:
  - type: grid
    cards:
      - type: markdown
        content: >-
          ## Heima

          # {{ state_attr('sensor.heima_home_view', 'title') or 'Heima' }}

          {{ state_attr('sensor.heima_home_view', 'subtitle') or '' }}

          {% set pills = state_attr('sensor.heima_home_view', 'pills') or [] %}
          {% if pills %}
          **{{ pills | join(' · ') }}**
          {% endif %}

      - type: entities
        title: House Summary
        show_header_toggle: false
        entities:
          - type: attribute
            entity: sensor.heima_home_view
            attribute: priority
            name: Priority
          - type: attribute
            entity: sensor.heima_home_view
            attribute: last_update
            name: Last update
      - type: markdown
        content: >-
          {% set status = state_attr('sensor.heima_home_view', 'status') or {} %}
          **{{ status.get('security', '') }}**

          {{ status.get('presence', '') }}

          {{ status.get('temperature', '') }}

  - type: grid
    cards:
      - type: markdown
        content: |
          ## Quick actions
      - type: grid
        columns: 4
        square: false
        cards:
          - type: button
            name: Relax
            icon: mdi:sofa
            tap_action:
              action: call-service
              service: script.heima_relax
          - type: button
            name: Buongiorno
            icon: mdi:weather-sunset-up
            tap_action:
              action: call-service
              service: script.heima_buongiorno
          - type: button
            name: Buonanotte
            icon: mdi:weather-night
            tap_action:
              action: call-service
              service: script.heima_buonanotte
          - type: button
            name: Ospiti
            icon: mdi:account-group
            tap_action:
              action: call-service
              service: script.heima_ospiti

  - type: grid
    cards:
      - type: markdown
        content: |
          ## Main rooms
      - type: markdown
        content: >-
          ### {{ state_attr('sensor.heima_room_living_view', 'title') or 'Living' }}

          {{ state_attr('sensor.heima_room_living_view', 'line1') or '' }}

          {{ state_attr('sensor.heima_room_living_view', 'line2') or '' }}
      - type: markdown
        content: >-
          ### {{ state_attr('sensor.heima_room_studio_view', 'title') or 'Studio' }}

          {{ state_attr('sensor.heima_room_studio_view', 'line1') or '' }}

          {{ state_attr('sensor.heima_room_studio_view', 'line2') or '' }}
      - type: markdown
        content: >-
          ### {{ state_attr('sensor.heima_room_bathroom_view', 'title') or 'Bathroom' }}

          {{ state_attr('sensor.heima_room_bathroom_view', 'line1') or '' }}

          {{ state_attr('sensor.heima_room_bathroom_view', 'line2') or '' }}
      - type: markdown
        content: >-
          ### {{ state_attr('sensor.heima_room_bedroom_view', 'title') or 'Bedroom' }}

          {{ state_attr('sensor.heima_room_bedroom_view', 'line1') or '' }}

          {{ state_attr('sensor.heima_room_bedroom_view', 'line2') or '' }}

  - type: grid
    cards:
      - type: entities
        title: Heima Insights
        show_header_toggle: false
        entities:
          - entity: sensor.heima_insights_view
            name: Status
      - type: markdown
        content: >-
          {% for item in state_attr('sensor.heima_insights_view', 'items') or [] %}
          - {{ item.get('text', '') }}
          {% endfor %}

      - type: entities
        title: Security
        show_header_toggle: false
        entities:
          - entity: sensor.heima_security_view
            name: Security
      - type: markdown
        content: >-
          {{ state_attr('sensor.heima_security_view', 'summary') or '' }}

          {% for item in state_attr('sensor.heima_security_view', 'items') or [] %}
          - {{ item }}
          {% endfor %}

          {% for item in state_attr('sensor.heima_security_view', 'alerts') or [] %}
          - {{ item }}
          {% endfor %}

  - type: grid
    cards:
      - type: entities
        title: Climate & Comfort
        show_header_toggle: false
        entities:
          - entity: sensor.heima_climate_view
            name: Climate
      - type: markdown
        content: >-
          **{{ state_attr('sensor.heima_climate_view', 'temperature') or '' }}**

          {{ state_attr('sensor.heima_climate_view', 'summary') or '' }}

          {{ state_attr('sensor.heima_climate_view', 'detail') or '' }}
