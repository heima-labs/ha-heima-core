name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pip install pytest-cov
          pytest -q --cov=custom_components/heima --cov-report=term-missing --cov-fail-under=70

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Check code style
        run: ruff check custom_components/heima tests

      - name: Check formatting
        run: ruff format --check custom_components/heima tests

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    # Informativo: non blocca la CI in questa fase
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install mypy

      - name: Run mypy
        run: mypy custom_components/heima --ignore-missing-imports --no-error-summary
