[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
# F = pyflakes, E/W = pycodestyle, I = isort
select = ["F", "E", "W", "I"]

# E501: line too long — handled by the formatter, not the linter
# E402: module-level import not at top — common in HA for TYPE_CHECKING guards
# F401 in __init__.py: often an intentional re-export
ignore = ["E501", "E402"]

[tool.ruff.lint.per-file-ignores]
# Tests often assign variables for side effects (F841)
# and have imports that look unused because they're used as fixtures
"tests/**/*.py" = ["F841"]

# __init__.py: unused F401 import can be an intentional re-export
"*/__init__.py" = ["F401"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.mypy]
python_version = "3.13"
ignore_missing_imports = true
# Progressive strictness: only enable the most useful checks without blocking CI
warn_unused_ignores = true
warn_redundant_casts = true
check_untyped_defs = true
