command:
  name: Heima Command
  description: Execute a supported Heima command through the orchestrator.
  fields:
    command:
      name: Command
      description: Supported command name.
      required: true
      selector:
        text:
    target:
      name: Target
      description: Optional command target payload.
      example: '{"zone_id": "living"}'
      selector:
        object:
    params:
      name: Params
      description: Optional command parameters payload.
      example: '{"intent": "scene_evening"}'
      selector:
        object:
    request_id:
      name: Request ID
      description: Optional request identifier.
      selector:
        text:

approve_proposal:
  name: Heima Approve Proposal
  description: Approve or reject a resident-facing pending proposal.
  fields:
    proposal_id:
      name: Proposal ID
      description: Proposal identifier to approve or reject.
      required: true
      selector:
        text:
    action:
      name: Action
      description: Resident review decision.
      required: true
      selector:
        select:
          options:
            - approved
            - rejected

override_approval:
  name: Heima Override Approval
  description: Apply an installer approval override to a pending proposal.
  fields:
    proposal_id:
      name: Proposal ID
      description: Proposal identifier to approve or reject.
      required: true
      selector:
        text:
    action:
      name: Action
      description: Installer override action.
      required: true
      selector:
        select:
          options:
            - approve
            - reject
    installer_override:
      name: Installer Override
      description: Must be true to confirm this decision is an installer override.
      required: true
      selector:
        boolean:

run_diagnostics:
  name: Heima Run Diagnostics
  description: Return structured Heima diagnostics and update sensor.heima_health attributes.
  fields:
    target:
      name: Target
      description: Optional command target payload.
      example: '{"entry_id": "abc123"}'
      selector:
        object:

set_mode:
  name: Heima Set Mode
  description: Set or clear a final house-state override.
  fields:
    mode:
      name: Mode
      description: Canonical house state to force while the override is active.
      required: true
      selector:
        select:
          options:
            - away
            - home
            - guest
            - vacation
            - sleeping
            - relax
            - working
    state:
      name: State
      description: True sets the override, false clears it only if the current override matches the selected mode.
      required: true
      selector:
        boolean:

set_override:
  name: Heima Set Override
  description: Apply an override for person, room, or heating scope.
  fields:
    scope:
      name: Scope
      description: Override scope.
      required: true
      selector:
        select:
          options:
            - person
            - room
            - heating
    id:
      name: Identifier
      description: Person slug or room id depending on scope.
      required: true
      selector:
        text:
    override:
      name: Override
      description: Override value.
      required: true
      selector:
        text:
